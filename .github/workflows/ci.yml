name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Start dev server
        run: npm run dev &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run API tests
        run: node scripts/test-api-ci.js
        env:
          TEST_PROVIDER: openai
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_MODEL: ${{ secrets.TEST_MODEL }}
          NODE_TLS_REJECT_UNAUTHORIZED: 0

      - name: Verify API routes
        run: |
          echo "--- Testing AI test route ---"
          curl -sf -X POST http://localhost:3000/api/ai/test \
            -H 'Content-Type: application/json' \
            -d '{"apiKey":"test","baseURL":"https://openapi.liblibai.cloud","model":"star-3"}' \
            -o /dev/null && echo "✓ AI test route works" || echo "✗ AI test route failed"

          echo "--- Checking route files ---"
          for route in analyze image video storyboard assets filesystem projects upload pdf; do
            if [ -f "app/api/$route/route.ts" ]; then
              echo "✓ Route /api/$route exists"
            else
              echo "✗ Route /api/$route missing"
            fi
          done
